<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0c0e14" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Exprobable" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Exprobable — Games</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preload" as="image" href="assets/game-world-map.png" media="(max-width: 900px)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="home home--world-map home--mobile-map-landing">
  <div class="home-bg" aria-hidden="true"></div>
  <header id="home-auth-bar" class="home-auth-bar" hidden>
    <span id="home-auth-status" class="home-auth-status"></span>
    <div class="home-auth-actions">
      <button type="button" class="home-auth-btn home-auth-btn--google" id="home-auth-google">
        Sign in with Google
      </button>
      <button type="button" class="home-auth-btn home-auth-btn--ghost" id="home-auth-signout" hidden>
        Sign out
      </button>
    </div>
  </header>
  <div
    id="auth-username-modal"
    class="auth-username-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="auth-username-title"
    hidden
  >
    <div class="auth-username-card">
      <h2 id="auth-username-title" class="auth-username-title">Choose a username</h2>
      <p class="auth-username-desc">3–20 characters: letters, numbers, underscores. Shown on this site when you’re signed in.</p>
      <form id="auth-username-form" class="auth-username-form">
        <label class="auth-username-label" for="auth-username-input">Username</label>
        <input
          id="auth-username-input"
          class="auth-username-input"
          type="text"
          autocomplete="username"
          maxlength="24"
          placeholder="e.g. blue_player"
          required
        />
        <p id="auth-username-error" class="auth-username-error" hidden></p>
        <button type="submit" class="home-auth-btn home-auth-btn--primary">Save</button>
      </form>
    </div>
  </div>
  <main class="world-map-main" role="navigation" aria-label="Games">
    <div class="world-map">
      <img
        class="world-map__img"
        src="assets/game-world-map.png"
        width="571"
        height="1024"
        alt="Fantasy world map. Markers show the four playable games: castle, fields, saloon, and cathedral."
        decoding="async"
        fetchpriority="high"
      />
      <!-- Shipped games only (see games/game-*.html without placeholder-card) -->
      <a class="map-plate map-plate--castle map-plate--accent-2" href="games/codenames.html" data-spot="castle">
        <span class="map-plate__label">Codenames vs AI</span>
      </a>
      <a class="map-plate map-plate--farmland map-plate--accent-1" href="games/word-search.html" data-spot="farmland">
        <span class="map-plate__label">Word Search</span>
      </a>
      <a class="map-plate map-plate--saloon map-plate--accent-3" href="games/game-3.html" data-spot="saloon">
        <span class="map-plate__label">Tech newspaper</span>
      </a>
      <a class="map-plate map-plate--cathedral map-plate--accent-4" href="games/game-4.html" data-spot="cathedral">
        <span class="map-plate__label">Imposter</span>
      </a>
    </div>
  </main>
  <script type="module" src="js/auth-home.js?v=1"></script>
</body>
</html>
