<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Word Search — Neoma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@500&family=Koh+Santepheap:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css?v=mqvis2" />
</head>
<body class="game-page game-page--wordsearch">
  <div class="home-bg" aria-hidden="true"></div>
  <header class="game-topbar">
    <a class="back-link" href="../index.html">← All games</a>
    <h1 class="game-title">Word Search</h1>
  </header>
  <main class="game-shell game-shell--wordsearch">
    <div class="wordsearch-layout">
      <div class="wordsearch-panel wordsearch-panel--grid">
        <p class="wordsearch-hint">Drag in a straight line to highlight a word, then answer the meaning question to clear it. Press Esc to close a question without clearing.</p>
        <div id="word-grid" class="word-grid" role="application" aria-label="Letter grid"></div>
      </div>
      <aside class="wordsearch-panel">
        <h2 class="word-list-title">Words to find</h2>
        <ul id="word-list" class="word-list"></ul>
        <p id="wordsearch-progress" class="wordsearch-progress" aria-live="polite"></p>
        <p id="wordsearch-win" class="wordsearch-win" role="status">You found every word. Nice work.</p>
      </aside>
    </div>
  </main>

  <div id="word-quiz-modal" class="word-quiz-modal" hidden aria-hidden="true">
    <div class="word-quiz-backdrop" tabindex="-1"></div>
    <div
      class="word-quiz-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="word-quiz-heading"
      aria-describedby="word-quiz-prompt"
    >
      <p id="word-quiz-heading" class="word-quiz-heading">You highlighted a word</p>
      <p id="word-quiz-prompt" class="word-quiz-prompt"></p>
      <p class="word-quiz-word" id="word-quiz-word" aria-label="Word found"></p>
      <p id="word-quiz-feedback" class="word-quiz-feedback" role="status" aria-live="polite"></p>
      <div class="word-quiz-choices" id="word-quiz-choices"></div>
    </div>
  </div>

  <script src="../js/game-result.js?v=1"></script>
  <script src="../js/word-search.js?v=2"></script>
</body>
</html>
